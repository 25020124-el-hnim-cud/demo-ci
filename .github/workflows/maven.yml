name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    # 1. Lấy code về (Đã nâng cấp lên v4)
    - uses: actions/checkout@v4
    
    # 2. Cài đặt JDK 17 và bật Cache (Đã nâng cấp lên v4)
    - name: Set up JDK 17 with Cache
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    # 3. Chạy lệnh build project
    - name: Build with Maven
      run: mvn package
      
    # 4. Lưu lại file .jar (SỬA LỖI Ở ĐÂY: Đã nâng cấp lên v4)
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: my-app-jar-${{ matrix.os }} 
        path: target/*.jar